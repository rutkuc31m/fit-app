<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%"   stop-color="#1a1410"/>
      <stop offset="55%"  stop-color="#0a0705"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="ring" x1="0.1" y1="0.9" x2="0.9" y2="0.1">
      <stop offset="0%"   stop-color="#fb7185"/>
      <stop offset="40%"  stop-color="#fbbf24"/>
      <stop offset="75%"  stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff"/>
      <stop offset="35%"  stop-color="#fde047"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Rounded tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Faint track ring -->
  <circle cx="256" cy="256" r="164" fill="none" stroke="#1a1410" stroke-width="10"/>

  <!-- Start marker (dim dot, bottom-left on ring) -->
  <circle cx="140" cy="372" r="9"  fill="#3a2d24"/>
  <circle cx="140" cy="372" r="4"  fill="#6d6d70"/>

  <!-- Progress arc (3/4 sweep from start toward goal) -->
  <circle cx="256" cy="256" r="164" fill="none"
          stroke="url(#ring)" stroke-width="14" stroke-linecap="round"
          pathLength="100"
          stroke-dasharray="72 100"
          stroke-dashoffset="0"
          transform="rotate(135 256 256)"
          filter="url(#soft)"/>

  <!-- Goal dot halo (big soft glow) -->
  <circle cx="372" cy="140" r="40" fill="#fde047" filter="url(#bigGlow)" opacity=".55"/>

  <!-- Goal dot (bright, filled) — top-right, target -->
  <circle cx="372" cy="140" r="22" fill="url(#dotGlow)" filter="url(#soft)"/>
  <circle cx="372" cy="140" r="10" fill="#fff"/>
</svg>

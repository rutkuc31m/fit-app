<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#1a1410"/>
      <stop offset="55%" stop-color="#0a0705"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fb7185"/>
      <stop offset="35%"  stop-color="#fbbf24"/>
      <stop offset="75%"  stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="peak" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"  stop-color="#fde047"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer journey ring (track) -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#1f1812" stroke-width="28"/>

  <!-- Progress arc (~78% sweep, starts bottom-left) -->
  <circle cx="256" cy="256" r="168" fill="none"
          stroke="url(#ring)" stroke-width="28" stroke-linecap="round"
          stroke-dasharray="823 1055"
          stroke-dashoffset="0"
          transform="rotate(130 256 256)"
          filter="url(#glow)"/>

  <!-- Progress head dot -->
  <circle cx="256" cy="256" r="168" fill="none"/>
  <g filter="url(#glow)">
    <circle cx="401" cy="174" r="14" fill="#fde047"/>
    <circle cx="401" cy="174" r="7" fill="#fff"/>
  </g>

  <!-- Inner peak symbol — rising arrow / mountain blend -->
  <g filter="url(#glow)">
    <path d="M170 320 L230 240 L265 280 L310 215 L360 295"
          fill="none" stroke="url(#peak)" stroke-width="18"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Center focal dot -->
  <circle cx="256" cy="256" r="4" fill="#fbbf24" opacity=".55"/>
</svg>
